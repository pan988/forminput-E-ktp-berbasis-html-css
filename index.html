<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Data E-KTP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h3>FORM INPUT DATA E-KTP</h3>
    <hr>
        <form action="#" method="post">
            <table>
                <tr>
                    <td>Provinsi</td>
                    <td>:</td>
                    <td>
                        <input type="text" name="provinsi">
                    </td>
                </tr> 
                <tr>
                    <td>Kabupaten/Kota</td>
                    <td>:</td>
                    <td><input type="text" name="Kabupaten/kota"></td>
                </tr>   
                
                <tr>
                    <td>NIK</td>
                    <td>:</td>
                    <td><input type="text" name="nik" maxlength="16"></td>
                </tr>

                <tr>
                    <td>Nama</td>
                    <td>:</td>
                    <td><input type="text" name="nama"></td>
                </tr>

                <tr>
                    <td>Tempat/Tgl Lahir</td>
                    <td>:</td>
                    <td>
                        <input type="text" name="tempat">
                        <input type="date" name="tgl_lahir">
                    </td>
                </tr>
                
                <tr>
                    <td>Jenis Kelamin</td>
                    <td>:</td>
                    <td>
                        <input type="radio" name="jenisK" id="LAKI-LAKI" value="LAKI-LAKI"><label for="LAKI-LAKI">LAKI-LAKI</label>
                        <input type="radio" name="jenisK" id="PEREMPUAN" value="PEREMPUAN"><label for="PEREMPUAN">PEREMPUAN</label>
                    </td>
                </tr>

                <tr>
                    <td>Gol.Darah</td>
                    <td>:</td>
                    <td><select>
                        <option value="-">-</option>
                        <option value="A">A</option>
                        <option value="B">B </option>
                        <option value="AB">AB</option>
                        <option value="O">O</option>
                    </select></td>
                </tr>
                

                <tr>
                    <td>Alamat</td> 
                    <td>:</td>
                    <td><input type="text" name="alamat"></td>
                </tr>

                <tr>
                    <td>RT/RW</td>
                    <td>:</td>
                    <td>
                        <input type="text" maxlength="3" name="rt" style="width: 60px;"> /
                        <input type="text" maxlength="3" name="rw" style="width: 60px;">
                    </td>
                </tr>

                <tr>
                    <td>Kel/Desa</td>
                    <td>:</td>
                    <td><input type="text" name="kel_ds"></td>
                </tr>

                <tr>
                    <td>Kecamatan</td>
                    <td>:</td>
                    <td><input type="text" name="kc"></td>
                </tr>
                <tr>
                    <td>Agama</td>
                    <td>:</td>
                    <td>
                        <select>
                            <option value="ISLAM">ISLAM</option>
                            <option value="KRISTEN">KRISTEN</option>
                            <option value="HINDU">HINDU</option>
                            <option value="KHONGHUCU">KHONGHUCU</option>
                            <option value="BUDHA">BUDHA</option>
                            <option value="KATOLIK">KATOLIK</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Status Perkawinan</td>
                    <td>:</td>
                    <td>
                        <select>
                            <option value="BELUM KAWIN">BELUM KAWIN</option>
                            <option value="KAWIN">KAWIN</option>
                            <option value="CERAI HIDUP">CERAI HIDUP</option>
                            <option value="CERAI MATI">CERAI MATI</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Pekerjaan</td>
                    <td>:</td>
                    <td><input type="text" name="pkj"></td>
                </tr>

                <tr>
                    <td>Kewarganegaraan</td>
                    <td>:</td>
                    <td>
                        <input type="radio" name="kwg" id="WNI"><label for="WNI">WNI</label>
                        <input type="radio" name="kwg" id="WNA"><label for="WNA">WNA</label>
                    </td>
                </tr>

                <tr>
                    <td>Berlaku Hingga</td>
                    <td>:</td>
                    <td><input type="text" value="SEUMUR HIDUP"></td>
                </tr>

                <tr>
                    <td>Tempat/Tanggal Cetak Ktp</td>
                    <td>:</td>
                    <td>
                        <input type="text" name="tmp">
                        <input type="date" name="tck">
                    </td>
                </tr>

                <tr>
                    <td>upload Gambar</td><label for="up"></label>
                    <td>:</td>
                    <td><input type="file" name="gambar_Profil" id="up" accept="image/*"></td>
                </tr>
               
            </table>
        <hr>
            <div class="buttons">
                <input type="submit" value="Simpan Data KTP">
                <input type="reset" value="Reset">
            </div>
        </form>
    </div>
</body>
</html>
